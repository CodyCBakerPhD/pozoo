name: Refresh pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Reset gh-pages to latest main
        run: |
          git fetch origin
          git checkout -B gh-pages origin/gh-pages || git checkout -b gh-pages origin/main
          git reset --hard origin/main
          git push origin gh-pages --force
